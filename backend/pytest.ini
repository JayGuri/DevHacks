[pytest]
# Run all tests from the backend directory
testpaths = tests

# Async test mode — auto-marks every async function as an asyncio test
asyncio_mode = auto

# Short traceback for cleaner output in CI
addopts =
    --tb=short
    -v

# Log capture
log_cli = true
log_cli_level = WARNING
log_level = WARNING

# Ignore deprecation warnings from third-party libs
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
